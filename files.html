<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your Files - Nami Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="brand">
                <i class="fas fa-heart"></i>
                <a href="index.html" style="color: inherit; text-decoration: none;">Nami x BTS</a>
                <span class="brand-sub">Army Drive</span>
            </div>
            
            <div class="search-container">
                <div class="input-with-icon">
                    <i class="fas fa-search"></i>
                    <input id="search-input" type="text" placeholder="Find your magic shop files...">
                </div>
            </div>

            <div class="nav-actions" style="display: flex; gap: 10px; align-items: center;">
                <select id="sort-select" style="width: auto; min-width: 100px; padding-left: 12px;">
                    <option value="name-asc">A-Z</option>
                    <option value="date-desc">Newest</option>
                    <option value="size-desc">Size</option>
                </select>
                <button id="logout-btn" class="secondary" style="padding: 10px 15px;">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: 40px;">
        <section id="upload-section">
            <div id="upload-area" class="upload-area">
                <div style="background: rgba(99, 102, 241, 0.1); width: 64px; height: 64px; border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px;">
                    <i class="fas fa-cloud-arrow-up" style="font-size: 2rem; color: var(--accent);"></i>
                </div>
                <h3 style="font-size: 1.25rem; margin-bottom: 8px;">Upload digital assets</h3>
                <p style="color: var(--muted); margin-bottom: 24px;">Drag and drop files here or click to browse</p>
                <input type="file" id="file-input" multiple style="display: none;">
                <button id="browse-btn">
                    Select Files
                </button>
            </div>
        </section>

        <section id="upload-progress-section" class="card reveal" style="display: none; border-left: 4px solid var(--accent);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h3 style="font-size: 1rem; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-spinner fa-spin"></i> Uploading...
                </h3>
                <button id="minimize-upload" class="secondary" style="padding: 4px 8px; font-size: 0.75rem;">
                    Dismiss
                </button>
            </div>
            <div id="upload-progress-list"></div>
        </section>

        <section id="stats-section" class="card reveal" style="padding: 24px; display: flex; align-items: center; justify-content: space-between; gap: 24px;">
            <div style="display: flex; align-items: center; gap: 16px;">
                <div style="width: 48px; height: 48px; background: rgba(16, 185, 129, 0.1); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2);">
                    <i class="fas fa-database" style="font-size: 1.25rem;"></i>
                </div>
                <div>
                    <div style="font-size: 0.85rem; color: var(--muted);">Total Usage</div>
                    <div id="total-usage" style="font-size: 1.1rem; font-weight: 700;">Counting...</div>
                </div>
            </div>
            <div style="flex: 1; max-width: 400px;">
                <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 8px;">
                    <span>Storage Health</span>
                    <span>100% Secure</span>
                </div>
                <div class="progress-bar" style="margin: 0;">
                    <div id="usage-bar" class="progress-fill" style="width: 15%; background: var(--success);"></div>
                </div>
            </div>
        </section>

        <section id="files-section" style="margin-top: 48px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="font-size: 1.5rem; font-weight: 700;">My Files</h2>
                <span id="file-count" style="font-size: 0.875rem; color: var(--muted);">0 items</span>
            </div>
            <div class="files-grid" id="files-list">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
        </section>
    </main>

    <!-- Post-upload success toast (Optional placeholder if needed by script) -->
    <div id="auth-msg" style="position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 2000;"></div>

    <!-- File Preview Modal -->
    <div id="preview-modal" class="modal">
        <div class="modal-content">
            <div style="padding: 32px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h3 id="preview-filename" style="font-size: 1.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%;">File Preview</h3>
                    <button id="close-preview" class="secondary" style="padding: 8px 12px; border-radius: 12px;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div id="preview-content" style="margin-bottom: 32px; min-height: 200px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); border-radius: 20px; overflow: hidden;">
                    <!-- Preview content will be inserted here -->
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button id="preview-download" class="secondary">
                        <i class="fas fa-download"></i> Download
                    </button>
                    <button id="preview-delete" style="background: var(--error);">
                        <i class="fas fa-trash-alt"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal">
        <div class="modal-content" style="max-width: 420px;">
            <div style="padding: 32px; text-align: center;">
                <div style="width: 64px; height: 64px; background: rgba(239, 68, 68, 0.1); color: var(--error); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 24px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem;"></i>
                </div>
                <h3 style="margin-bottom: 12px; font-size: 1.25rem;">Confirm deletion</h3>
                <p style="color: var(--muted); margin-bottom: 32px; font-size: 0.95rem;">
                    Are you sure you want to delete <strong id="delete-filename" style="color: var(--text);"></strong>? This cannot be undone.
                </p>
                <div style="display: flex; gap: 12px;">
                    <button id="cancel-delete" class="secondary" style="flex: 1;">Cancel</button>
                    <button id="confirm-delete" style="background: var(--error); flex: 1;">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
