<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cloud Storage - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
</head>
<body>
    <!-- Background elements -->
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none;">
        <div style="position: absolute; top: -10%; left: -10%; width: 40%; height: 40%; background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, transparent 70%); filter: blur(60px); animation: pulse 10s infinite alternate;"></div>
        <div style="position: absolute; bottom: -10%; right: -10%; width: 50%; height: 50%; background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, transparent 70%); filter: blur(60px); animation: pulse 8s infinite alternate-reverse;"></div>
    </div>

    <header class="site-header">
        <div class="container header-inner">
            <div class="brand">
                <i class="fas fa-cloud"></i>
                <span>Nami Cloud</span>
                <span class="brand-sub">Secure Gateway</span>
            </div>
        </div>
    </header>

    <main class="container">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 160px);">
            <div class="card reveal" style="max-width: 450px; width: 100%; border: 1px solid rgba(255,255,255,0.1); background: rgba(17, 24, 39, 0.8);">
                <div style="text-align: center; margin-bottom: 32px;">
                    <div style="display: inline-flex; align-items: center; justify-content: center; width: 80px; height: 80px; background: rgba(99, 102, 241, 0.1); border-radius: 24px; margin-bottom: 24px; border: 1px solid rgba(99, 102, 241, 0.2);">
                        <i class="fas fa-shield-halved" style="font-size: 2.5rem; color: var(--accent);"></i>
                    </div>
                    <h1 style="font-size: 2rem; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 8px;">Welcome Back</h1>
                    <p style="color: var(--muted);">Manage your digital life in one place</p>
                </div>

                <form id="auth-section" onsubmit="return false;">
                    <div class="input-group">
                        <label style="font-size: 0.875rem; color: var(--muted); margin-left: 4px;">Email Address</label>
                        <div class="input-with-icon">
                            <i class="fas fa-envelope"></i>
                            <input id="email" type="email" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label style="font-size: 0.875rem; color: var(--muted); margin-left: 4px;">Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input id="password" type="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div style="margin-top: 40px; display: flex; flex-direction: column; gap: 16px;">
                        <button id="login-btn" style="width: 100%;">
                            Sign In <i class="fas fa-arrow-right"></i>
                        </button>
                        
                        <div style="display: flex; align-items: center; gap: 12px; margin: 8px 0;">
                            <div style="flex: 1; height: 1px; background: var(--border);"></div>
                            <span style="font-size: 0.875rem; color: var(--muted);">or</span>
                            <div style="flex: 1; height: 1px; background: var(--border);"></div>
                        </div>
                        
                        <button id="signup-btn" class="secondary" style="width: 100%;">
                            Create New Account
                        </button>
                    </div>

                    <div id="auth-msg" class="reveal" style="margin-top: 24px; text-align: center; min-height: 1.5em; font-size: 0.875rem;"></div>
                </form>
            </div>
            <p style="margin-top: 32px; color: var(--muted); font-size: 0.875rem;">
                Protected by industry-leading encryption
            </p>
        </div>
    </main>

    <style>
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1.2); opacity: 0.4; }
        }
    </style>

    <script src="script.js"></script>
</body>
</html>
